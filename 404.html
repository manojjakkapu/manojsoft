<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Manojsoft</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;700;800&family=Satoshi:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Satoshi',sans-serif;background:#0a1628;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.wrap{padding:2rem}
h1{font-family:'Cabinet Grotesk',sans-serif;font-size:8rem;font-weight:800;background:linear-gradient(135deg,#00c9a7,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
h2{font-family:'Cabinet Grotesk',sans-serif;font-size:1.5rem;margin:1rem 0 .5rem}
p{color:#7b8794;margin-bottom:2rem}
a{display:inline-block;padding:.75rem 2rem;background:#00c9a7;color:#0a1628;border-radius:50px;font-weight:700;text-decoration:none;transition:all .3s}
a:hover{background:#00a88a;transform:translateY(-2px)}
</style>
</head>
<body>
<div class="wrap">
<h1>404</h1>
<h2>Page not found</h2>
<p>The page you're looking for doesn't exist or has been moved.</p>
<a href="/">Back to Home</a>
</div>
</body>
</html>
